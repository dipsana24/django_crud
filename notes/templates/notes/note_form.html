{% extends 'notes/base.html' %} 

{% block content %}
<div class="page-header">
  <h2>{{ type }} Note</h2>
  <a href="{% url 'note_list' %}" class="btn btn-outline">Cancel</a>
</div>

<div class="card">
  <form method="POST">
    {% csrf_token %}
    
    <!-- Render form fields manually for better styling -->
    <div class="form-group">
      <label for="{{ form.title.id_for_label }}">Note Title</label>
      {{ form.title }}
      {% if form.title.errors %}
        <div style="color: var(--danger); font-size: 0.875rem; margin-top: 0.25rem;">{{ form.title.errors }}</div>
      {% endif %}
    </div>
    
    <div class="form-group">
      <label for="{{ form.content.id_for_label }}">Content</label>
      {{ form.content }}
      {% if form.content.errors %}
        <div style="color: var(--danger); font-size: 0.875rem; margin-top: 0.25rem;">{{ form.content.errors }}</div>
      {% endif %}
    </div>
    
    <div class="actions" style="margin-top: 2rem;">
      <button type="submit" class="btn btn-primary">Save Note</button>
    </div>
  </form>
</div>

<!-- Add some inline styles to target Django's generated inputs until we fully transition to manual rendering -->
<style>
  input[type="text"], textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    transition: var(--transition);
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
  }
  textarea {
    min-height: 200px;
    resize: vertical;
  }
</style>
{% endblock %}
