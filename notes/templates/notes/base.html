<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Django Notes CRUD</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f8f9fa;
        color: #212529;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }
      a {
        text-decoration: none;
        color: #0d6efd;
      }
      h1 a {
        color: #1a1e21;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid #e9ecef;
      }
      .btn {
        padding: 8px 16px;
        border: 1px solid #ced4da;
        background-color: #ffffff;
        border-radius: 6px;
        display: inline-block;
        margin-right: 8px;
        color: #212529;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .btn:hover {
        background-color: #e2e6ea;
      }
      .btn-danger {
        border-color: #dc3545;
        color: #dc3545;
      }
      .btn-danger:hover {
        background-color: #dc3545;
        color: #ffffff;
      }
      .note-card {
        background-color: #ffffff;
        border: 1px solid #e9ecef;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        transition: transform 0.2s ease;
      }
      .note-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
      }
      .note-card h2 {
        margin-top: 0;
        margin-bottom: 8px;
      }
      .note-card small {
        color: #6c757d;
        display: block;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1><a href="{% url 'note_list' %}">My Notes</a></h1>
      <a href="{% url 'note_create' %}" class="btn">+ New Note</a>
    </div>

    {% block content %}{% endblock %}
  </body>
</html>
